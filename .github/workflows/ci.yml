##
# CI — Puzzle Book Generator
#
# Runs on every push and pull request.
# Jobs:
#   lint    — TypeScript type-check across all packages
#   test    — Vitest unit tests
#   build   — Full monorepo build
#
# Database-dependent tests are skipped in CI (no Supabase connection).
# Integration tests that require a live DB are tagged with `@integration`
# and excluded here via the `exclude` pattern in vitest.config.ts.
##

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ---------------------------------------------------------------------------
  # Type check
  # ---------------------------------------------------------------------------
  lint:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check — shared
        run: npm run build --workspace=packages/shared

      - name: Type check — puzzle-generator
        run: npx tsc --noEmit --project packages/puzzle-generator/tsconfig.json

      - name: Type check — book-generator
        run: npx tsc --noEmit --project packages/book-generator/tsconfig.json

      - name: Type check — CLI
        run: npx tsc --noEmit --project apps/cli/tsconfig.json

  # ---------------------------------------------------------------------------
  # Unit tests
  # ---------------------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared (tests depend on it)
        run: npm run build --workspace=packages/shared

      - name: Run unit tests
        run: npm test
        env:
          # No real DB in CI — integration tests are excluded by vitest config
          NODE_ENV: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Full build
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Confirm CLI entry point exists
        run: test -f apps/cli/dist/index.js && echo "CLI build OK"
